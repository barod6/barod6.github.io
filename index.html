<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BL Creative</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#050509;
  color:#fff;
  font-family:Inter,Cairo,sans-serif;
  overflow-x:hidden;
}

/* HEADER */
header{
  width:100%;
  padding:16px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#000;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
  z-index:10;
}
header .logo-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}
header img{
  height:52px;
  object-fit:contain;
  display:block;
}
header .brand-text{
  font-size:13px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#aaa;
}
nav{display:flex;gap:22px}
nav a{
  color:#ccc;
  text-decoration:none;
  font-size:14px;
  transition:.2s;
}
nav a:hover{color:#fff}
.lang-switcher{
  background:#222;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #444;
  cursor:pointer;
  font-size:13px;
}

/* HERO */
.hero{
  padding:80px 40px 60px;
  max-width:1150px;
  margin:auto;
  display:grid;
  grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);
  gap:40px;
  align-items:center;
}
.hero-main h1{
  font-size:40px;
  line-height:1.2;
  margin-bottom:16px;
}
.hero-main h1 span{
  background:linear-gradient(90deg,#6b5bff,#9b5bff);
  -webkit-background-clip:text;
  color:transparent;
}
.hero-main p{
  font-size:15px;
  color:#b8b8c8;
  margin-bottom:20px;
}
.hero-buttons{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:16px;
}
.btn-primary{
  padding:10px 20px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,#6b5bff,#9b5bff);
  color:#fff;
  font-size:14px;
  cursor:pointer;
}
.btn-secondary{
  padding:9px 18px;
  border-radius:999px;
  border:1px solid #333;
  background:#111;
  color:#ccc;
  font-size:14px;
  cursor:pointer;
}
.hero-meta{
  font-size:12px;
  color:#8f8fa0;
}
.hero-meta span{display:block;margin-bottom:4px}
.hero-card{
  background:radial-gradient(circle at top,#26264a 0,#0b0b12 55%);
  border-radius:18px;
  padding:18px 18px 16px;
  border:1px solid rgba(107,91,255,.4);
  box-shadow:0 0 40px rgba(0,0,0,.7);
  font-size:13px;
}
.hero-card-label{
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#9a9ab5;
  margin-bottom:8px;
}
.hero-card-main{
  color:#e5e5ff;
  margin-bottom:10px;
}
.hero-card-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(155,91,255,.5);
  background:rgba(5,5,9,.85);
  font-size:11px;
  color:#b3b3d0;
}

/* SECTIONS */
section{
  padding:40px 40px;
  max-width:1200px;
  margin:auto;
}
.section-title{
  font-size:24px;
  margin-bottom:8px;
}
.section-sub{
  font-size:14px;
  color:#a8a8b8;
  margin-bottom:24px;
}

/* SERVICES */
.services-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:18px;
}
.card{
  background:#0b0b12;
  border-radius:14px;
  padding:16px 16px 14px;
  border:1px solid #222;
  font-size:13px;
}
.card h3{
  font-size:15px;
  margin-bottom:6px;
}
.card p{
  font-size:12px;
  color:#b3b3c5;
}

/* COMPARISONS */
.comparisons-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
}
.compare-card{
  background:#0b0b12;
  border-radius:14px;
  padding:14px;
  border:1px solid #222;
  font-size:12px;
}
.compare-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:#9a9ab5;
  margin-bottom:8px;
}
.compare-images{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.compare-box{
  background:#111;
  border-radius:10px;
  padding:6px;
  text-align:center;
  border:1px solid #222;
}
.compare-box span{
  display:block;
  font-size:11px;
  color:#9a9ab5;
  margin-bottom:4px;
}
.compare-box .img-placeholder{
  width:100%;
  height:120px;
  border-radius:8px;
  background:#1a1a24;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:#666;
}

/* CONTACT */
.contact-grid{
  display:grid;
  grid-template-columns:minmax(0,1.1fr) minmax(0,1fr);
  gap:22px;
}
.contact-form{
  display:flex;
  flex-direction:column;
  gap:10px;
  font-size:13px;
}
.contact-form input,
.contact-form textarea{
  width:100%;
  padding:9px 10px;
  border-radius:8px;
  border:1px solid #333;
  background:#050509;
  color:#fff;
  font-size:13px;
}
.contact-form textarea{min-height:90px;resize:vertical}
.contact-info{
  font-size:13px;
  color:#b3b3c5;
  line-height:1.6;
}

/* FOOTER */
footer{
  padding:20px 40px 26px;
  max-width:1200px;
  margin:10px auto 0;
  border-top:1px solid #222;
  font-size:11px;
  color:#8a8a9a;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

/* RTL / LTR */
.rtl{direction:rtl;text-align:right}
.ltr{direction:ltr;text-align:left}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{
    grid-template-columns:minmax(0,1fr);
  }
  .hero-card{order:-1}
  nav{display:none}
  .services-grid,
  .comparisons-grid{
    grid-template-columns:minmax(0,1fr);
  }
  .contact-grid{
    grid-template-columns:minmax(0,1fr);
  }
}
@media(max-width:700px){
  .hero-main h1{font-size:32px}
  section{padding:32px 20px}
  header{padding:14px 20px}
}
</style>
</head>

const langSelect=document.getElementById("langSelect");

function updateLanguage(lang){
  const d=content[lang];
  document.documentElement.dir=d.dir;
  document.documentElement.lang=lang;

  document.getElementById("nav").innerHTML=
    d.nav.map((t,i)=>{
      const ids=["home","services","comparisons","contact"];
      return `<a href="#${ids[i]}">${t}</a>`;
    }).join("");

  document.getElementById("title").textContent=d.title;
  document.getElementById("subtitle").textContent=d.subtitle;
  document.getElementById("btn1").textContent=d.btn1;
  document.getElementById("btn2").textContent=d.btn2;
  document.getElementById("meta1").textContent=d.meta1;
  document.getElementById("meta2").textContent=d.meta2;
  document.getElementById("heroLabel").textContent=d.heroLabel;
  document.getElementById("heroMain").textContent=d.heroMain;
  document.getElementById("heroPill").textContent=d.heroPill;

  document.getElementById("servicesTitle").textContent=d.servicesTitle;
  document.getElementById("servicesSub").textContent=d.servicesSub;
  document.getElementById("servicesGrid").innerHTML=
    d.services.map(s=>`
      <div class="card">
        <h3>${s.title}</h3>
        <p>${s.text}</p>
      </div>
    `).join("");

  document.getElementById("compareTitle").textContent=d.compareTitle;
  document.getElementById("compareSub").textContent=d.compareSub;
  document.getElementById("compareGrid").innerHTML=
    d.comparisons.map(c=>`
      <div class="compare-card">
        <div class="compare-label">${c.label}</div>
        <div class="compare-images">
          <div class="compare-box">
            <span>${d.dir==="rtl"?"قبل":"Before"}</span>
            <div class="img-placeholder">before.jpg</div>
          </div>
          <div class="compare-box">
            <span>${d.dir==="rtl"?"بعد":"After"}</span>
            <div class="img-placeholder">after.jpg</div>
          </div>
        </div>
      </div>
    `).join("");

  document.getElementById("contactTitle").textContent=d.contactTitle;
  document.getElementById("contactSub").textContent=d.contactSub;
  document.getElementById("name").placeholder=d.placeholders.name;
  document.getElementById("email").placeholder=d.placeholders.email;
  document.getElementById("message").placeholder=d.placeholders.message;
  document.getElementById("sendBtn").textContent=d.sendBtn;
  document.getElementById("contactInfo").textContent=d.contactInfo;
  document.getElementById("footer").textContent=d.footer;
}

langSelect.addEventListener("change",()=>updateLanguage(langSelect.value));
