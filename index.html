<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BL Creative</title>

<!-- Fonts that support Arabic + European languages -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ===========================
   GLOBAL RESET
=========================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  background: #050509;
  color: #fff;
  font-family: Inter, Cairo, sans-serif;
  overflow-x: hidden;
}

/* ===========================
   HEADER
=========================== */
header {
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #000;
  border-bottom: 1px solid #222;
  position: sticky;
  top: 0;
  z-index: 10;
}

header img {
  height: 60px;
  object-fit: contain;
}

nav {
  display: flex;
  gap: 24px;
}

nav a {
  color: #ccc;
  text-decoration: none;
  font-size: 15px;
  transition: 0.2s ease;
}

nav a:hover {
  color: #fff;
}

.lang-switcher {
  background: #222;
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid #444;
}

/* ===========================
   HERO SECTION
=========================== */
.hero {
  padding: 100px 40px;
  max-width: 1100px;
  margin: auto;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 20px;
  line-height: 1.3;
}

.hero p {
  font-size: 18px;
  color: #bbb;
  margin-bottom: 30px;
}

.hero .btns {
  display: flex;
  justify-content: center;
  gap: 16px;
}

.btn-primary {
  padding: 12px 24px;
  background: linear-gradient(135deg, #6b5bff, #9b5bff);
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-size: 15px;
}

.btn-secondary {
  padding: 12px 24px;
  background: #111;
  border: 1px solid #333;
  border-radius: 8px;
  color: #ccc;
  cursor: pointer;
  font-size: 15px;
}

/* ===========================
   SERVICES
=========================== */
section {
  padding: 80px 40px;
  max-width: 1200px;
  margin: auto;
}

.section-title {
  font-size: 32px;
  margin-bottom: 10px;
}

.section-sub {
  font-size: 16px;
  color: #aaa;
  margin-bottom: 40px;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.service-card {
  background: #0b0b12;
  padding: 24px;
  border-radius: 12px;
  border: 1px solid #222;
}

.service-card h3 {
  font-size: 20px;
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: #bbb;
}

/* ===========================
   PORTFOLIO
=========================== */
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.portfolio-card {
  background: #0b0b12;
  padding: 24px;
  border-radius: 12px;
  border: 1px solid #222;
}

.portfolio-card h3 {
  font-size: 20px;
  margin-bottom: 10px;
}

.portfolio-card p {
  font-size: 14px;
  color: #bbb;
}

/* ===========================
   CONTACT
=========================== */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #111;
  color: #fff;
  font-size: 14px;
}

.contact-form textarea {
  min-height: 120px;
}

.contact-info {
  font-size: 15px;
  color: #ccc;
  line-height: 1.7;
}

/* ===========================
   FOOTER
=========================== */
footer {
  padding: 30px;
  text-align: center;
  color: #777;
  border-top: 1px solid #222;
  margin-top: 40px;
}

/* ===========================
   RTL SUPPORT
=========================== */
.rtl {
  direction: rtl;
  text-align: right;
}

.ltr {
  direction: ltr;
  text-align: left;
}

/* ===========================
   RESPONSIVE
=========================== */
@media (max-width: 900px) {
  .services-grid,
  .portfolio-grid {
    grid-template-columns: 1fr;
  }

  .contact-grid {
    grid-template-columns: 1fr;
  }

  nav {
    display: none;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="images/bl-creative-logo.png" alt="BL Creative Logo">

  <nav id="nav"></nav>

  <select id="langSelect" class="lang-switcher">
    <option value="en">English</option>
    <option value="ar">العربية</option>
    <option value="fr">Français</option>
    <option value="no">Norsk</option>
  </select>
</header>

<!-- HERO -->
<section class="hero">
  <h1 id="title"></h1>
  <p id="subtitle"></p>

  <div class="btns">
    <button class="btn-primary" id="btn1"></button>
    <button class="btn-secondary" id="btn2"></button>
  </div>
</section>

<!-- SERVICES -->
<section id="services">
  <h2 class="section-title" id="servicesTitle"></h2>
  <p class="section-sub" id="servicesSub"></p>

  <div class="services-grid" id="servicesGrid"></div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio">
  <h2 class="section-title" id="portfolioTitle"></h2>
  <p class="section-sub" id="portfolioSub"></p>

  <div class="portfolio-grid" id="portfolioGrid"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2 class="section-title" id="contactTitle"></h2>
  <p class="section-sub" id="contactSub"></p>

  <div class="contact-grid">
    <form class="contact-form">
      <input id="name" type="text" placeholder="">
      <input id="email" type="email" placeholder="">
      <textarea id="message" placeholder=""></textarea>
      <button class="btn-primary" id="sendBtn"></button>
    </form>

    <div class="contact-info" id="contactInfo"></div>
  </div>
</section>

<!-- FOOTER -->
<footer id="footer"></footer>

/* ===========================
   LANGUAGE SWITCHER
=========================== */
const langSelect = document.getElementById("langSelect");

function updateLanguage(lang) {
  const data = content[lang];

  document.documentElement.dir = data.dir;
  document.documentElement.lang = lang;

  document.getElementById("nav").innerHTML =
    data.nav.map(item => `<a href="#">${item}</a>`).join("");

  document.getElementById("title").textContent = data.title;
  document.getElementById("subtitle").textContent = data.subtitle;

  document.getElementById("btn1").textContent = data.btn1;
  document.getElementById("btn2").textContent = data.btn2;

  document.getElementById("servicesTitle").textContent = data.servicesTitle;
  document.getElementById("servicesSub").textContent = data.servicesSub;

  document.getElementById("servicesGrid").innerHTML =
    data.services.map(s => `
      <div class="service-card">
        <h3>${s.title}</h3>
        <p>${s.text}</p>
      </div>
    `).join("");

  document.getElementById("portfolioTitle").textContent = data.portfolioTitle;
  document.getElementById("portfolioSub").textContent = data.portfolioSub;

  document.getElementById("portfolioGrid").innerHTML =
    data.portfolio.map(p => `
      <div class="portfolio-card">
        <h3>${p.title}</h3>
        <p>${p.text}</p>
      </div>
    `).join("");

  document.getElementById("contactTitle").textContent = data.contactTitle;
  document.getElementById("contactSub").textContent = data.contactSub;

  document.getElementById("name").placeholder = data.placeholders.name;
  document.getElementById("email").placeholder = data.placeholders.email;
  document.getElementById("message").placeholder = data.placeholders.message;

  document.getElementById("sendBtn").textContent = data.sendBtn;

  document.getElementById("contactInfo").textContent = data.contactInfo;

  document.getElementById("footer").textContent = data.footer;
}

langSelect.addEventListener("change", () => {
  updateLanguage(langSelect.value);
});

updateLanguage("en");
</script>

</body>
</html>
